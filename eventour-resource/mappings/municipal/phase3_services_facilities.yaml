# Phase 3 service/facility conversion mapping.
#
# Copy this file to mappings/phase3_services_mappings.yaml.
# The converter is mapping-driven but still has special handlers for:
# - parking capacity extraction from TAB1
# - EV charging titolare/provider organization
# - EV charging typology code expansion
# - address nodes
# - SKOS-like concept URI generation

defaults:
  language: "it"
  crs_uri: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
  publisher_uri: "http://eventour.unimib.it/organization/comune-di-milano"
  pipeline_agent_uri: "http://eventour.unimib.it/agent/eventour-pipeline"
  transform_date: "2026-04-29"

datasets:

  bike_areesosta:
    file: "bike_areesosta.geojson"
    dataset_uri: "dataset/bike_areesosta"
    transform_activity_uri: "activity/transform/bike_areesosta/2026-04-29"
    entity_uri_template: "bicycle-parking-area/{id_amat}"
    identifier_field: "id_amat"
    label_template: "Bicycle parking area {id_amat}"
    classes:
      - "evt:BicycleParkingArea"
      - "evt:ParkingFacility"
      - "evt:Facility"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: null
      street_id_field: "via_id"
      street_name_field: "via_nome"
      street_type_field: "via_tipo"
      house_number_field: "num_civico"
    fields:
      stato: {property: "evt:status", kind: "concept", scheme: "status"}
      municipio: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}
      veicoli: {property: "evt:permittedVehicleType", kind: "multi_concept", scheme: "vehicle-type"}
      tipo_man: {property: "evt:streetFurnitureType", kind: "concept", scheme: "street-furniture-type"}
      nmanufatti: {property: "evt:numberOfStructures", kind: "integer"}
      stalli_man: {property: "evt:stallsPerStructure", kind: "integer"}
      stalli_totali: {property: "evt:numberOfBikeStalls", kind: "integer"}
      ubicazione: {property: "evt:placementContext", kind: "concept", scheme: "placement-context"}

  bikemi_stazioni:
    file: "bikemi_stazioni.geojson"
    dataset_uri: "dataset/bikemi_stazioni"
    transform_activity_uri: "activity/transform/bikemi_stazioni/2026-04-29"
    entity_uri_template: "bike-sharing-station/{id_amat}"
    identifier_field: "id_amat"
    label_field: "nome"
    classes:
      - "evt:BikeSharingStation"
      - "evt:Facility"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: "indirizzo"
      street_id_field: "id_via"
      house_number_field: "civico"
    fields:
      stato: {property: "evt:status", kind: "concept", scheme: "status"}
      numero: {property: "evt:stationNumber", kind: "literal", datatype: "xsd:string"}
      tipo: {property: "evt:stationLayoutType", kind: "concept", scheme: "station-layout-type"}
      stalli: {property: "evt:numberOfBikeStalls", kind: "integer"}
      sede: {property: "evt:placementContext", kind: "concept", scheme: "placement-context"}
      zd_attuale: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}
      anno: {property: "evt:year", kind: "gYear"}

  ds69_openwifi_layer_0_open_wifi_outdoor_4326_final:
    file: "ds69_openwifi_layer_0_open_wifi_outdoor_4326_final.geojson"
    dataset_uri: "dataset/ds69_openwifi_layer_0_open_wifi_outdoor_4326_final"
    transform_activity_uri: "activity/transform/ds69_openwifi_layer_0_open_wifi_outdoor_4326_final/2026-04-29"
    entity_uri_template: "wifi-access-point/{AP}"
    identifier_field: "AP"
    label_template: "Open WiFi access point {AP}"
    classes:
      - "evt:WiFiAccessPoint"
      - "evt:Infrastructure"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: "indirizzo"
      postal_code_field: "CAP"
    fields:
      MUNICIPIO: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}
      ID_NIL: {property: "evt:inNIL", kind: "resource", uri_template: "nil/{value}"}
      NIL: {property: "evt:nilName", kind: "literal", datatype: "rdf:langString"}

  ds290_economia_botteghe_storiche_2024:
    file: "ds290_economia_botteghe_storiche_2024.geojson"
    dataset_uri: "dataset/ds290_economia_botteghe_storiche_2024"
    transform_activity_uri: "activity/transform/ds290_economia_botteghe_storiche_2024/2026-04-29"
    entity_uri_template: "historic-shop/{N.}"
    identifier_field: "N."
    label_field: "TARGA"
    classes:
      - "evt:HistoricShop"
      - "evt:Facility"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: "INDIRIZZO"
      postal_code_field: "CAP"
    fields:
      GENERE MERCEOLOGICO: {property: "evt:commercialCategory", kind: "concept", scheme: "commercial-category"}
      ANNO: {property: "evt:year", kind: "gYear"}
      STATO: {property: "evt:status", kind: "concept", scheme: "status"}
      MUNICIPIO: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}
      ID_NIL: {property: "evt:inNIL", kind: "resource", uri_template: "nil/{value}"}
      NIL: {property: "evt:nilName", kind: "literal", datatype: "rdf:langString"}

  ds630_servizi_igienici_pubblici_final:
    file: "ds630_servizi_igienici_pubblici_final.geojson"
    dataset_uri: "dataset/ds630_servizi_igienici_pubblici_final"
    transform_activity_uri: "activity/transform/ds630_servizi_igienici_pubblici_final/2026-04-29"
    entity_uri_template: "public-toilet/{OBJECTID}"
    identifier_field: "OBJECTID"
    label_template: "Public toilet {OBJECTID}"
    classes:
      - "evt:PublicToilet"
      - "evt:Facility"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: null
      street_name_field: "VIA"
      locality_field: "LOCALITA"
    fields:
      VIA: {property: "evt:streetName", kind: "literal", datatype: "rdf:langString"}
      LOCALITA: {property: "evt:locality", kind: "literal", datatype: "rdf:langString"}
      ULTERIORI_INFO: {property: "evt:additionalInfo", kind: "literal", datatype: "rdf:langString"}
      DISPONIBILITA: {property: "evt:availabilityDescription", kind: "literal", datatype: "rdf:langString"}
      TIPO: {property: "evt:toiletType", kind: "concept", scheme: "toilet-type"}
      MUNICIPIO: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}
      ID_NIL: {property: "evt:inNIL", kind: "resource", uri_template: "nil/{value}"}
      NIL: {property: "evt:nilName", kind: "literal", datatype: "rdf:langString"}

  park_interscambio:
    file: "park_interscambio.geojson"
    dataset_uri: "dataset/park_interscambio"
    transform_activity_uri: "activity/transform/park_interscambio/2026-04-29"
    entity_uri_template: "parking-facility/interchange/{Nome}"
    identifier_field: "Nome"
    label_field: "Nome"
    classes:
      - "evt:InterchangeParkingFacility"
      - "evt:ParkingFacility"
      - "evt:Facility"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: "indirizzo"
    special:
      parse_capacity_from_TAB1: true
      derive_interchange_line_from_INFO: true
    fields:
      TAB1: {property: "evt:capacityDescription", kind: "literal", datatype: "rdf:langString"}
      INFO: {property: "evt:interchangeInformation", kind: "literal", datatype: "rdf:langString"}
      Zona: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}

  park_pub:
    file: "park_pub.geojson"
    dataset_uri: "dataset/park_pub"
    transform_activity_uri: "activity/transform/park_pub/2026-04-29"
    entity_uri_template: "parking-facility/public/{id}"
    identifier_field: "id"
    label_field: "nome"
    classes:
      - "evt:ParkingFacility"
      - "evt:Facility"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: "indirizzo"
    fields:
      n_posti: {property: "evt:parkingSpaces", kind: "integer"}
      comune: {property: "evt:municipalityName", kind: "literal", datatype: "rdf:langString"}
      tipo: {property: "evt:parkingType", kind: "concept", scheme: "parking-type"}

  ricarica_colonnine:
    file: "ricarica_colonnine.geojson"
    dataset_uri: "dataset/ricarica_colonnine"
    transform_activity_uri: "activity/transform/ricarica_colonnine/2026-04-29"
    entity_uri_template: "ev-charging-station/{id_amat}"
    identifier_field: "id_amat"
    label_template: "EV charging station {id_amat}"
    classes:
      - "evt:EVChargingStation"
      - "evt:Facility"
      - "evt:Infrastructure"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      address_field: "localita"
      street_id_field: "id_via"
      street_name_field: "nome_via"
    special:
      titolare_as_responsible_organization: true
      expand_charging_typology: true
      project_as_resource: true
    fields:
      municipio: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}
      id_sottonil: {property: "evt:inSubNIL", kind: "resource", uri_template: "subnil/{value}"}
      id_nil: {property: "evt:inNIL", kind: "resource", uri_template: "nil/{value}"}
      nome_nil: {property: "evt:nilName", kind: "literal", datatype: "rdf:langString"}
      cerchia: {property: "evt:urbanBelt", kind: "concept", scheme: "urban-belt"}
      ambito_id: {property: "evt:parkingAreaIdentifier", kind: "literal", datatype: "xsd:string"}
      ambito_nome: {property: "evt:parkingAreaName", kind: "literal", datatype: "rdf:langString"}
      attuazione: {property: "evt:implementationStatus", kind: "concept", scheme: "implementation-status"}
      tipologia: {property: "evt:chargingTypology", kind: "charging_typology"}
      numero_col: {property: "evt:numberOfChargingColumns", kind: "integer"}
      numero_pdr: {property: "evt:numberOfChargingPoints", kind: "integer"}
      infra: {property: "evt:infrastructureType", kind: "concept", scheme: "charging-infrastructure"}
      note: {property: "evt:additionalInfo", kind: "literal", datatype: "rdf:langString"}
      ordinanza: {property: "evt:ordinance", kind: "literal", datatype: "xsd:string"}
      anno: {property: "evt:year", kind: "gYear"}

  vedovelle_20260315-233003_final:
    file: "vedovelle_20260315-233003_final.geojson"
    dataset_uri: "dataset/vedovelle_20260315-233003_final"
    transform_activity_uri: "activity/transform/vedovelle_20260315-233003_final/2026-04-29"
    entity_uri_template: "drinking-fountain/{objectID}"
    identifier_field: "objectID"
    label_template: "Vedovella {objectID}"
    classes:
      - "evt:DrinkingFountain"
      - "evt:Infrastructure"
      - "evt:ServiceAccessPoint"
      - "geo:Feature"
    address:
      postal_code_field: "CAP"
    fields:
      MUNICIPIO: {property: "evt:inMunicipality", kind: "resource", uri_template: "municipality/{value}"}
      ID_NIL: {property: "evt:inNIL", kind: "resource", uri_template: "nil/{value}"}
      NIL: {property: "evt:nilName", kind: "literal", datatype: "rdf:langString"}
